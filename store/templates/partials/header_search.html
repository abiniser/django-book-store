{% load i18n %}
<form action="{% url 'store.category' %}"      class="d-flex mx-auto">
    <div class="input-group">
      <input
        value="{{request.GTE.query}}"
        name="query"
        type="text"
        class="form-control"
        style="width: 400px"
        placeholder= "{% trans 'Search' %}"
      />
      <select class="form-control" style="width: 160px" name="category" na>
        <option value="">{% trans 'All ' %}</option>
        {% for category in categories %}
        <option value="{{category.id}}" 
          {% if category.id|stringformat:i == request.GET.category %} selected {% endif %} 
          {}
        
        >{{ category.name }}
       </option>
        {% endfor %}
      </select>
      <button class="btn btn-primary" type="submit">
        <i class="lni lni-search-alt text-white"></i>
      </button>
    </div>
  </form>
